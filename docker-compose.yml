services:
  nginx:
    image: nginx:alpine
    container_name: sebook-nginx
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  app-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sebook-app-1
    env_file:
      - .env
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_NAME: ${DB_NAME:-sebook}
      DB_USERNAME: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      DB_PRIMARY_HOST: postgres-primary
      DB_READ_HOST_1: postgres-replica-1
      DB_READ_HOST_2: postgres-replica-2
      DB_URL: jdbc:postgresql://postgres-primary:5432/${DB_NAME:-sebook}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_AUTH_COOKIE_SECURE: ${APP_AUTH_COOKIE_SECURE:-true}
      APP_AUTH_COOKIE_SAME_SITE: ${APP_AUTH_COOKIE_SAME_SITE:-None}
      LOGGING_FILE_NAME: /logs/app/application.log
    volumes:
      - ./logs/app:/logs/app
      - ./config/keys:/app/config/keys:ro
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    ports:
      - "8080:8080"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 180s

  app-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sebook-app-2
    env_file:
      - .env
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_NAME: ${DB_NAME:-sebook}
      DB_USERNAME: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      DB_PRIMARY_HOST: postgres-primary
      DB_READ_HOST_1: postgres-replica-1
      DB_READ_HOST_2: postgres-replica-2
      DB_URL: jdbc:postgresql://postgres-primary:5432/${DB_NAME:-sebook}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_AUTH_COOKIE_SECURE: ${APP_AUTH_COOKIE_SECURE:-true}
      APP_AUTH_COOKIE_SAME_SITE: ${APP_AUTH_COOKIE_SAME_SITE:-None}
      LOGGING_FILE_NAME: /logs/app/application.log
    volumes:
      - ./logs/app:/logs/app
      - ./config/keys:/app/config/keys:ro
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    ports:
      - "8081:8080"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 180s

  postgres-primary:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg15}
    container_name: sebook-postgres-primary
    environment:
      POSTGRES_DB: ${DB_NAME:-sebook}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicator_password}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/primary/init-replication-user.sh:/docker-entrypoint-initdb.d/10-init-replication-user.sh:ro
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-sebook}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-replica-1:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg15}
    container_name: sebook-postgres-replica-1
    environment:
      PGUSER: ${POSTGRES_REPLICATION_USER:-replicator}
      PGPASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicator_password}
      PGHOST: postgres-primary
      PGPORT: 5432
      REPLICA_SLOT: replica_1
    command:
      - /bin/bash
      - -c
      - tr -d '\r' < /usr/local/bin/init-replica.sh > /tmp/init-replica.sh && /bin/bash /tmp/init-replica.sh
    volumes:
      - postgres-read-1-data:/var/lib/postgresql/data
      - ./postgres/replica/init-replica.sh:/usr/local/bin/init-replica.sh:ro
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_REPLICATION_USER:-replicator} -d postgres"]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres-replica-2:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg15}
    container_name: sebook-postgres-replica-2
    environment:
      PGUSER: ${POSTGRES_REPLICATION_USER:-replicator}
      PGPASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicator_password}
      PGHOST: postgres-primary
      PGPORT: 5432
      REPLICA_SLOT: replica_2
    command:
      - /bin/bash
      - -c
      - tr -d '\r' < /usr/local/bin/init-replica.sh > /tmp/init-replica.sh && /bin/bash /tmp/init-replica.sh
    volumes:
      - postgres-read-2-data:/var/lib/postgresql/data
      - ./postgres/replica/init-replica.sh:/usr/local/bin/init-replica.sh:ro
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_REPLICATION_USER:-replicator} -d postgres"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sebook-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: sebook-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: sebook-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: sebook-loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - monitoring
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: sebook-promtail
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - ./logs:/logs:ro
      - /var/log:/var/log:ro
    depends_on:
      - loki
    networks:
      - monitoring
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: sebook-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER:-appuser}:${DB_PASSWORD:-changeme_in_production}@postgres-primary:5432/${DB_NAME:-sebook}?sslmode=disable
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - monitoring
      - backend
    restart: unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: sebook-nginx-exporter
    command: ["--nginx.scrape-uri=http://nginx/nginx_status"]
    depends_on:
      - nginx
    networks:
      - monitoring
      - backend
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: sebook-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - monitoring
      - backend
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  postgres-primary-data:
  postgres-read-1-data:
  postgres-read-2-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
