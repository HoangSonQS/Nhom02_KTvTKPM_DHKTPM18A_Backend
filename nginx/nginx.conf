user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11 ipv6=off valid=10s;

    log_format json_log escape=json
      '{'
      '"time":"$time_iso8601",'
      '"status":"$status",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"upstream":"$upstream_addr",'
      '"response_time":"$request_time",'
      '"upstream_response_time":"$upstream_response_time",'
      '"body_bytes":"$body_bytes_sent",'
      '"remote_addr":"$remote_addr",'
      '"request_id":"$request_id",'
      '"user_agent":"$http_user_agent"'
      '}';

    access_log /var/log/nginx/access.log json_log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    map $http_cf_connecting_ip $rate_limit_key {
        default $http_cf_connecting_ip;
        "" $remote_addr;
    }

    limit_req_status 429;
    limit_req_log_level warn;

    # Gateway-level rate limits are IP based. Cloudflare should pass CF-Connecting-IP.
    limit_req_zone $rate_limit_key zone=api_global:20m rate=100r/m;
    limit_req_zone $rate_limit_key zone=auth_login:10m rate=5r/m;
    limit_req_zone $rate_limit_key zone=auth_register:10m rate=1r/m;
    limit_req_zone $rate_limit_key zone=auth_password:10m rate=1r/m;
    limit_req_zone $rate_limit_key zone=auth_refresh:10m rate=30r/m;
    limit_req_zone $rate_limit_key zone=cart_write:10m rate=60r/m;
    limit_req_zone $rate_limit_key zone=checkout:10m rate=5r/m;
    limit_req_zone $rate_limit_key zone=returns_write:10m rate=10r/m;
    limit_req_zone $rate_limit_key zone=reviews_write:10m rate=10r/m;
    limit_req_zone $rate_limit_key zone=ai_chat:10m rate=10r/m;
    limit_req_zone $rate_limit_key zone=ai_search:10m rate=30r/m;
    limit_req_zone $rate_limit_key zone=ai_vision:10m rate=5r/m;

    include /etc/nginx/conf.d/*.conf;
}
