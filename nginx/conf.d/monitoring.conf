server {
    listen 80;
    server_name grafana.sebook.click;

    auth_basic "SEBook Monitoring";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        set $grafana_upstream grafana:3000;
        proxy_pass http://$grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/live/ {
        set $grafana_upstream grafana:3000;
        proxy_pass http://$grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name grafana.sebook.click;

    ssl_certificate /etc/nginx/certs/api.sebook.click.pem;
    ssl_certificate_key /etc/nginx/certs/api.sebook.click.key;

    auth_basic "SEBook Monitoring";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        set $grafana_upstream grafana:3000;
        proxy_pass http://$grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/live/ {
        set $grafana_upstream grafana:3000;
        proxy_pass http://$grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}

