server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: spring-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: spring-app
          env: prod
          __path__: /logs/app/application.log
    pipeline_stages:
      - multiline:
          firstline: '^\{'
          max_wait_time: 3s
      - json:
          expressions:
            level: level
            logger: logger_name
            traceId: traceId
      - labels:
          level:
          logger:
      - drop:
          expression: '.*health.*'

  - job_name: spring-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: spring-error
          severity: error
          __path__: /logs/app/error.log
    pipeline_stages:
      - json:
          expressions:
            level: level
      - labels:
          level:

  - job_name: spring-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: spring-audit
          __path__: /logs/app/audit.log

  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-access
          __path__: /logs/nginx/access.log
    pipeline_stages:
      - json:
          expressions:
            status: status
            method: method
            uri: uri
            response_time: response_time
      - labels:
          status:
          method:
      - drop:
          expression: '"uri":"/nginx-health"'

  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-error
          severity: error
          __path__: /logs/nginx/error.log
