global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: spring-boot
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app-1:8080
          - app-2:8080

  - job_name: nginx
    static_configs:
      - targets:
          - nginx-exporter:9113

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
