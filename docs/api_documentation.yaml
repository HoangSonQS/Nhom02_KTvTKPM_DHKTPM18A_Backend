---
Tested Status: done
API: POST /api/v1/orders/checkout
Module: order
Controller: OrderController
Description: >
  Checkout và tạo đơn hàng từ toàn bộ giỏ hàng hiện tại của User.
  Hệ thống tự động lấy shippingAddress và customerPhone từ Profile (địa chỉ mặc định)
  nếu không được truyền trong request. Nếu truyền vào, giá trị trong request sẽ được ưu tiên.
Authentication:
  required: true
  type: Bearer JWT
  roles: [ORDER_CREATE]
Request:
  Headers:
    - name: Authorization
      value: "Bearer {token}"
      required: true
    - name: Content-Type
      value: application/json
      required: true
  PathVariables: []
  QueryParams: []
  RequestBody:
    contentType: application/json
    schema:
      requestId: {type: String, required: true, validation: Unique/Idempotency-Key, example: "req-uuid-001"}
      shippingAddress: {type: String, required: false, validation: NotBlank if no default in profile, example: "123 Lê Lợi, Q1, HCM"}
      customerPhone: {type: String, required: false, validation: NotBlank if no phone in profile, example: "0901234567"}
      couponCode: {type: String, required: false, validation: None, example: "GIAM20K"}
    example: |
      {
          "requestId": "req-uuid-001"
      }
    exampleWithOverride: |
      {
          "requestId": "req-uuid-002",
          "shippingAddress": "456 Nguyễn Huệ, Q1, HCM",
          "customerPhone": "0909999999",
          "couponCode": "GIAM20K"
      }
Response:
  schema:
    success: {type: boolean}
    data: {type: Long, description: "ID của đơn hàng vừa tạo"}
    message: {type: String}
  example: |
    {"success": true, "data": 102, "message": "Operation successful"}
Notes:
  - requestId dùng để chống tạo đơn trùng lặp (Idempotency). Mỗi lần checkout cần requestId khác nhau.
  - Phải có ít nhất 1 sản phẩm trong giỏ hàng, nếu không trả lỗi "Giỏ hàng rỗng".
  - shippingAddress tự động lấy từ địa chỉ mặc định trong Profile nếu không truyền.
  - customerPhone tự động lấy từ Profile nếu không truyền.
  - Nếu cả request lẫn Profile đều không có địa chỉ/SĐT, trả về lỗi 400.
  - Saga Pattern: Inventory -> Promotion (nếu có coupon) -> Complete. Bất kỳ bước nào thất bại đều rollback.
TestCases:
  - id: TC_54
    name: "Checkout - Dùng thông tin từ Profile (không truyền address/phone)"
    type: HAPPY_PATH
    input:
      headers: {"Authorization": "Bearer {customer_token}", "Content-Type": "application/json"}
      body: {"requestId": "req-uuid-001"}
      pathVars: {}
      queryParams: {}
    expected:
      status: 200
      body: {success: true, data: "<orderId>"}
    precondition: "User đã có địa chỉ mặc định và SĐT trong Profile. Giỏ hàng không rỗng."

  - id: TC_55
    name: "Checkout - Override địa chỉ giao hàng khác Profile"
    type: HAPPY_PATH
    input:
      headers: {"Authorization": "Bearer {customer_token}", "Content-Type": "application/json"}
      body: {"requestId": "req-uuid-002", "shippingAddress": "789 Đinh Tiên Hoàng, Q1", "customerPhone": "0901111111"}
      pathVars: {}
      queryParams: {}
    expected:
      status: 200

  - id: TC_56
    name: "Checkout - Giỏ hàng rỗng"
    type: ERROR_PATH
    input:
      headers: {"Authorization": "Bearer {customer_token}", "Content-Type": "application/json"}
      body: {"requestId": "req-uuid-003"}
      pathVars: {}
      queryParams: {}
    expected:
      status: 400
      message: "Giỏ hàng rỗng"

  - id: TC_57
    name: "Checkout - Profile không có địa chỉ và không truyền address"
    type: ERROR_PATH
    input:
      headers: {"Authorization": "Bearer {customer_token}", "Content-Type": "application/json"}
      body: {"requestId": "req-uuid-004"}
      pathVars: {}
      queryParams: {}
    expected:
      status: 400
      message: "Vui lòng cung cấp địa chỉ giao hàng"

  - id: TC_58
    name: "Checkout - Idempotency (gửi requestId đã dùng)"
    type: HAPPY_PATH
    input:
      headers: {"Authorization": "Bearer {customer_token}", "Content-Type": "application/json"}
      body: {"requestId": "req-uuid-001"}
      pathVars: {}
      queryParams: {}
    expected:
      status: 200
      body: {data: "<same orderId as TC_54>"}
    note: "Không tạo đơn mới, trả về orderId cũ."
  
