Tested Status: done
API: POST /api/v1/payments/create-payment-url
Module: payment
Controller: PaymentController
Description: |
  Tạo link thanh toán VNPay cho đơn hàng.
  - vnp_TxnRef = orderId_timestamp (unique mỗi lần nhấn, tránh lỗi duplicate trên VNPay Sandbox)
  - Chỉ cho phép tạo URL khi đơn hàng đang ở trạng thái PENDING_PAYMENT
  - Nếu đơn đã PAID → trả lỗi 4301 (Conflict)
  - Nếu đơn ở trạng thái khác (CANCELLED, COMPLETED, RETURNED) → trả lỗi 4300 (Bad Request)
Authentication:
  required: true
  type: Bearer JWT
  roles: [CUSTOMER, ADMIN]
Request:
  Headers:
    - name: Authorization
      value: "Bearer {token}"
      required: true
  PathVariables: []
  QueryParams:
    - name: orderId
      type: Long
      required: true
      description: ID của đơn hàng cần thanh toán
      example: 3
  RequestBody:
    contentType: null
    schema: {}
    example: ""
TestCases:
  - id: TC_PAY_01
    name: "Create payment URL - Happy Path"
    type: HAPPY_PATH
    input:
      headers: {"Authorization": "Bearer customer_token"}
      body: {}
      pathVars: {}
      queryParams: {"orderId": 3}
    expected:
      status: 200
      body: {"paymentUrl": "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html?..."}

  - id: TC_PAY_01_ERR_01
    name: "Create payment URL - Order not found"
    type: ERROR_CASE
    input:
      headers: {"Authorization": "Bearer customer_token"}
      body: {}
      pathVars: {}
      queryParams: {"orderId": 9999}
    expected:
      status: 404
      body: {"success": false, "code": 4304, "message": "Không tìm thấy đơn hàng"}

  - id: TC_PAY_01_ERR_02
    name: "Create payment URL - Order already PAID"
    type: ERROR_CASE
    input:
      headers: {"Authorization": "Bearer customer_token"}
      body: {}
      pathVars: {}
      queryParams: {"orderId": 3}
    expected:
      status: 409
      body: {"success": false, "code": 4301, "message": "Đơn hàng đã được thanh toán"}

  - id: TC_PAY_01_ERR_03
    name: "Create payment URL - Order in invalid status (CANCELLED)"
    type: ERROR_CASE
    input:
      headers: {"Authorization": "Bearer customer_token"}
      body: {}
      pathVars: {}
      queryParams: {"orderId": 5}
    expected:
      status: 400
      body: {"success": false, "code": 4300, "message": "Đơn hàng đang ở trạng thái CANCELLED, không thể thanh toán"}

  - id: TC_PAY_01_ERR_04
    name: "Create payment URL - Unauthorized (no token)"
    type: ERROR_CASE
    input:
      headers: {}
      body: {}
      pathVars: {}
      queryParams: {"orderId": 3}
    expected:
      status: 401
      body: {"success": false, "code": 4012, "message": "Token không hợp lệ"}

