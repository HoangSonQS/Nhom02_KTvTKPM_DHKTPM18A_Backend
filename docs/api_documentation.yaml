Tested Status: done
API: GET /api/v1/payments/vnpay-ipn
Module: payment
Controller: PaymentController
Description: |
  VNPay IPN (Instant Payment Notification) — VNPay server gọi về backend sau khi thanh toán.
  - Đây là channel chính trong môi trường Production (không phụ thuộc trình duyệt người dùng)
  - Response phải đúng format JSON của VNPay: {"RspCode": "XX", "Message": "..."}
  - VNPay sẽ retry nếu không nhận được RspCode "00"
  - Idempotent: nếu đơn đã PAID → trả {"RspCode":"00","Message":"Already confirmed"}
  Mã RspCode trả về VNPay:
    "00" = Xác nhận thành công (kể cả đơn đã xử lý)
    "97" = Chữ ký không hợp lệ
    "01" = Order không tìm thấy
    "04" = Số tiền không khớp
    "99" = Lỗi khác
Authentication:
  required: false
  type: None
  roles: []
Request:
  Headers: []
  PathVariables: []
  QueryParams:
    - name: vnp_ResponseCode
      type: String
      required: true
      description: Mã kết quả từ VNPay
      example: "00"
    - name: vnp_TxnRef
      type: String
      required: true
      description: Mã tham chiếu duy nhất (format orderId_timestamp)
      example: "3_1714464000000"
    - name: vnp_Amount
      type: String
      required: true
      description: Số tiền * 100
      example: "49000000"
    - name: vnp_TransactionNo
      type: String
      required: true
      description: Mã giao dịch từ VNPay (lưu vào Payment.transactionId)
      example: "VNP15518671"
    - name: vnp_SecureHash
      type: String
      required: true
      description: Chữ ký HMAC-SHA512
      example: "abc123..."
  RequestBody:
    contentType: null
    schema: {}
    example: ""
TestCases:
  - id: TC_PAY_03
    name: "VNPay IPN - Payment Success"
    type: HAPPY_PATH
    input:
      headers: {}
      body: {}
      pathVars: {}
      queryParams:
        vnp_ResponseCode: "00"
        vnp_TxnRef: "3_1714464000000"
        vnp_Amount: "49000000"
        vnp_SecureHash: "<valid_hash>"
    expected:
      status: 200
      body: {"RspCode": "00", "Message": "Confirm success"}

  - id: TC_PAY_03_ERR_01
    name: "VNPay IPN - Invalid signature"
    type: ERROR_CASE
    input:
      headers: {}
      body: {}
      pathVars: {}
      queryParams:
        vnp_ResponseCode: "00"
        vnp_TxnRef: "3_1714464000000"
        vnp_SecureHash: "INVALID"
    expected:
      status: 200
      body: {"RspCode": "97", "Message": "Invalid Checksum"}

  - id: TC_PAY_03_ERR_02
    name: "VNPay IPN - Order not found"
    type: ERROR_CASE
    input:
      headers: {}
      body: {}
      pathVars: {}
      queryParams:
        vnp_ResponseCode: "00"
        vnp_TxnRef: "9999_1714464000000"
        vnp_SecureHash: "<valid_hash>"
    expected:
      status: 200
      body: {"RspCode": "01", "Message": "Order not found"}

  - id: TC_PAY_03_ERR_03
    name: "VNPay IPN - Amount mismatch"
    type: ERROR_CASE
    input:
      headers: {}
      body: {}
      pathVars: {}
      queryParams:
        vnp_ResponseCode: "00"
        vnp_TxnRef: "3_1714464000000"
        vnp_Amount: "1000"
        vnp_SecureHash: "<valid_hash>"
    expected:
      status: 200
      body: {"RspCode": "04", "Message": "Invalid amount"}

  - id: TC_PAY_03_ERR_04
    name: "VNPay IPN - Duplicate (Already confirmed)"
    type: EDGE_CASE
    input:
      headers: {}
      body: {}
      pathVars: {}
      queryParams:
        vnp_ResponseCode: "00"
        vnp_TxnRef: "3_1714464000000"
        vnp_SecureHash: "<valid_hash>"
    expected:
      status: 200
      body: {"RspCode": "00", "Message": "Already confirmed"}

  - id: TC_PAY_03_ERR_05
    name: "VNPay IPN - Payment failed by VNPay (user insufficient funds)"
    type: ERROR_CASE
    input:
      headers: {}
      body: {}
      pathVars: {}
      queryParams:
        vnp_ResponseCode: "51"
        vnp_TxnRef: "3_1714464000000"
        vnp_SecureHash: "<valid_hash>"
    expected:
      status: 200
      body: {"RspCode": "00", "Message": "Confirm success"}
      note: "Lưu Payment(FAILED) vào DB, không cập nhật Order status, trả 00 để VNPay không retry"



