Tested Status: done
API: GET /api/v1/payments/vnpay-return
Module: payment
Controller: PaymentController
Description: |
  VNPay Return Callback — VNPay redirect trình duyệt người dùng về URL này sau khi thanh toán.
  - Dùng chủ yếu khi TEST ở localhost (production dùng IPN)
  - Tự động tách orderId từ vnp_TxnRef (format: orderId_timestamp)
  - Xác minh chữ ký (SecureHash) trước khi cập nhật DB
  - Idempotent: nếu đơn đã PAID thì không làm gì, vẫn trả 200
  Các vnp_ResponseCode phổ biến:
    "00" = Thành công
    "24" = Người dùng hủy
    "51" = Tài khoản không đủ số dư
    "65" = Quá hạn mức giao dịch
Authentication:
  required: false
  type: None
  roles: []
Request:
  Headers: []
  PathVariables: []
  QueryParams:
    - name: vnp_ResponseCode
      type: String
      required: true
      description: Mã phản hồi từ VNPay (00 = thành công, 24 = hủy, ...)
      example: "00"
    - name: vnp_TxnRef
      type: String
      required: true
      description: Mã tham chiếu duy nhất (format orderId_timestamp)
      example: "3_1714464000000"
    - name: vnp_Amount
      type: String
      required: true
      description: Số tiền * 100 (VND, không có dấu thập phân)
      example: "49000000"
    - name: vnp_SecureHash
      type: String
      required: true
      description: Chữ ký HMAC-SHA512 từ VNPay
      example: "abc123..."
  RequestBody:
    contentType: null
    schema: {}
    example: ""
TestCases:
  - id: TC_PAY_02
    name: "VNPay Return - Payment Success"
    type: HAPPY_PATH
    input:
      headers: {}
      body: {}
      pathVars: {}
      queryParams:
        vnp_ResponseCode: "00"
        vnp_TxnRef: "3_1714464000000"
        vnp_Amount: "49000000"
        vnp_SecureHash: "<valid_hash>"
    expected:
      status: 200
      body: {"success": true, "code": 200, "message": "Payment Success! You can close this tab and return to the app."}

  - id: TC_PAY_02_ERR_01
    name: "VNPay Return - User cancelled (ResponseCode=24)"
    type: ERROR_CASE
    input:
      headers: {}
      body: {}
      pathVars: {}
      queryParams:
        vnp_ResponseCode: "24"
        vnp_TxnRef: "3_1714464000000"
        vnp_SecureHash: "<valid_hash>"
    expected:
      status: 400
      body: {"success": false, "message": "Payment Failed or Cancelled. Error Code: 24"}

  - id: TC_PAY_02_ERR_02
    name: "VNPay Return - Invalid signature (tampered params)"
    type: ERROR_CASE
    input:
      headers: {}
      body: {}
      pathVars: {}
      queryParams:
        vnp_ResponseCode: "00"
        vnp_TxnRef: "3_1714464000000"
        vnp_SecureHash: "INVALID_HASH"
    expected:
      status: 400
      body: {"success": false, "message": "Payment Failed or Cancelled."}

  - id: TC_PAY_02_ERR_03
    name: "VNPay Return - Duplicate (Order already PAID — idempotent)"
    type: EDGE_CASE
    input:
      headers: {}
      body: {}
      pathVars: {}
      queryParams:
        vnp_ResponseCode: "00"
        vnp_TxnRef: "3_1714464000000"
        vnp_SecureHash: "<valid_hash>"
    expected:
      status: 200
      note: "Đơn đã PAID → handlePaymentCallback trả 'Already confirmed', vnpay-return vẫn hiển thị success"

