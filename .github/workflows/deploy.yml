name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  IMAGE_NAME: sebook-backend

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Test and package application
        run: ./mvnw -q -DskipTests verify

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/app
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export APP_VERSION="${{ github.sha }}"

            docker compose pull app-1 app-2
            docker compose up -d --no-deps --force-recreate app-1 app-2

            echo "Waiting for app instances to become healthy..."
            for i in $(seq 1 24); do
              if curl -fsS http://localhost:8080/actuator/health >/dev/null \
                && curl -fsS http://localhost:8081/actuator/health >/dev/null; then
                echo "Both app instances are healthy."
                break
              fi

              if [ "$i" -eq 24 ]; then
                echo "App instances did not become healthy in time."
                docker compose ps
                docker compose logs app-1 --tail=80
                docker compose logs app-2 --tail=80
                exit 1
              fi

              echo "Apps are still starting... attempt $i/24"
              sleep 10
            done

            docker compose up -d nginx nginx-exporter prometheus grafana loki promtail
            docker compose exec -T nginx nginx -s reload

            echo "Waiting for nginx to route to the refreshed app containers..."
            for i in $(seq 1 12); do
              if curl -fsS http://localhost/nginx-health >/dev/null \
                && curl -fsS http://localhost/actuator/health >/dev/null; then
                echo "Nginx gateway is healthy."
                break
              fi

              if [ "$i" -eq 12 ]; then
                echo "Nginx gateway did not become healthy in time."
                docker compose ps
                docker compose logs app-1 --tail=80
                docker compose logs app-2 --tail=80
                docker compose logs nginx --tail=80
                exit 1
              fi

              echo "Nginx is still reconnecting... attempt $i/12"
              sleep 5
            done

            if ! curl -f http://localhost/actuator/health; then
              docker compose logs app-1 --tail=50
              docker compose logs app-2 --tail=50
              docker compose logs nginx --tail=50
              exit 1
            fi

            docker image prune -f
            echo "Deploy completed: $(date)"
