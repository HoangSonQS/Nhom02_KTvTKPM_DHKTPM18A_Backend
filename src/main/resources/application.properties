spring.application.name=Nhom02_KTvTKPM_DHKTPM18A_Backend

# ===============================
# PostgreSQL Database Configuration
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/sebook}
spring.datasource.username=${DB_USERNAME:sebook}
spring.datasource.password=${DB_PASSWORD:sebook}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
