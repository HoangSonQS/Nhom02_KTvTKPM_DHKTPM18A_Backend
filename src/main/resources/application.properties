spring.application.name=SEBook-Backend

# ===== DataSource =====
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/${DB_NAME:sebook}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== HIKARI CONNECTION POOL =====
spring.datasource.hikari.pool-name=SeBookHikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=8
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=30000

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== JWT (Phase 9 Hardening - RS256) =====
# Mode: FILE (paths) or BASE64 (env)
jwt.private-key-source=${JWT_PRIVATE_KEY:file:./config/keys/private_key.pem}
# Format: kid:source,kid2:source2
jwt.public-key-sources=dev-key-1:${JWT_PUBLIC_KEY:file:./config/keys/public_key.pem}
jwt.active-kid=dev-key-1

jwt.access-token-expiration=${JWT_ACCESS_EXPIRY:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRY:2592000000}

# Security & OTP
jwt.otp-secret=${JWT_OTP_SECRET:default-fallback-otp-secret-key-must-change-in-prod}
jwt.password-reset-expiration=900000

# ===== Caching TTL (Phase 9 Performance) =====
cache.ttl.catalog-books=600000
cache.ttl.admin-dashboard=3600000
cache.ttl.auth-permissions=86400000

# ===== Mail =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== Cloudinary =====
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===== API Docs =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===== Brevo API (Email) =====
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:}
brevo.sender.name=${BREVO_SENDER_NAME:}
brevo.api.url=${BREVO_API_URL:}

# Disable Default Mail Health Indicator (Using Brevo HTTP API instead of SMTP)
management.health.mail.enabled=false

# ===== Thymeleaf =====
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===== Actuator & Micrometer =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

# ===== Resilience4j Circuit Breaker =====
resilience4j.circuitbreaker.instances.inventoryService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.inventoryService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.inventoryService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.inventoryService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.inventoryService.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.inventoryService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.inventoryService.eventConsumerBufferSize=10

# ===== ALIBABA DASHSCOPE AI =====
spring.ai.dashscope.api-key=${AI_DASHSCOPE_API_KEY}
spring.ai.dashscope.chat.enabled=true
spring.ai.dashscope.chat.options.model=qwen3.5-122b-a10b
spring.ai.dashscope.embedding.enabled=true
spring.ai.dashscope.embedding.options.model=text-embedding-v3

# ===== PGVECTOR STORE =====
spring.ai.vectorstore.pgvector.initialize-schema=false
spring.ai.vectorstore.pgvector.table-name=ai_book_vectors
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.dimensions=1536
