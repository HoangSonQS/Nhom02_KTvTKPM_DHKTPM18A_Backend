# Spring Boot Test Configuration (H2 In-memory)
# spring.profiles.active=test (Removed, invalid in profile-specific resource)

# Database H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate & Flyway
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=false

# JWT & Security (Dynamic keys injected in tests)
jwt.otp-secret=test-otp-secret
jwt.password-reset-expiration=900000
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=86400000

# Logging
logging.level.iuh.fit.se=DEBUG
logging.level.org.springframework.security=DEBUG

# ===== Fake Brevo API for Test =====
brevo.api.key=fake-key
brevo.sender.email=test@sebook.com
brevo.sender.name=SEBook Test
brevo.api.url=http://localhost:8080/fake-brevo

# ===== Thymeleaf for Test =====
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===== Micrometer for Test =====
management.metrics.tags.application=sebook-test
 management.endpoints.web.exposure.include=health,info

# ===== Redis for Test (Disabled or Mocked via Bean) =====
spring.data.redis.host=localhost
spring.data.redis.port=6379
