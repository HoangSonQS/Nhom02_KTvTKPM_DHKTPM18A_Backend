# Spring Boot Test Configuration (H2 In-memory)
# spring.profiles.active=test (Removed, invalid in profile-specific resource)

# Database H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate & Flyway
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=false

# JWT Secret for Test
jwt.secret=testsecretKeyForModularMonolithBackendProject2026fit_iuh_se_fit_iuh_se
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=86400000

# Logging
logging.level.iuh.fit.se=DEBUG
logging.level.org.springframework.security=DEBUG
